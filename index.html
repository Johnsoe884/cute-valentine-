<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise for Kim! ❤️</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #fff0f3; 
            text-align: center; 
            padding-top: 10vh; 
            overflow: hidden; 
            margin: 0;
            width: 100vw;
            height: 100vh;
            transition: background 0.8s ease;
            position: fixed; /* Prevents bouncing/scrolling on mobile */
        }

        #card { 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            display: inline-block; 
            box-shadow: 0 10px 30px rgba(255,77,109,0.2); 
            max-width: 400px; 
            width: 85%; 
            border: 2px solid #ffccd5; 
            position: relative;
            z-index: 10;
            animation: heartbeat 3s infinite ease-in-out;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        h2 { color: #ff4d6d; line-height: 1.6; font-size: 20px; min-height: 100px; }

        .btn-container { 
            margin-top: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px; 
            height: 60px;
        }

        button { 
            font-size: 18px; 
            padding: 12px 30px; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            transition: 0.3s; 
            font-weight: bold; 
            min-width: 100px;
            touch-action: manipulation;
        }

        .yes { background-color: #ff4d6d; color: white; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); }
        
        .no { 
            background-color: #adb5bd; 
            color: white; 
            position: relative; 
            z-index: 1000;
            transition: 0.1s ease-out; /* Faster transition so it doesn't lag behind the finger */
        }

        .heart {
            position: fixed;
            top: -10vh;
            font-size: 1.5rem;
            color: #ff4d6d;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .final-img {
            display: block;
            margin: 20px auto;
            max-width: 100%;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="card">
    <h2 id="display-text">ဟေး... မင်းအတွက် Surprise တစ်ခုရှိတယ်... ကြည့်မလား? 🎁</h2>
    <div id="btn-container">
        <button class="yes" id="yesBtn" onclick="handleYes()">Yes</button>
        <button class="no" id="noBtn" onclick="handleNo()" onmouseover="moveNo()" ontouchstart="moveNo()">No</button>
    </div>
</div>

<script>
    let step = 1;

    function handleYes() {
        const text = document.getElementById('display-text');
        step++;

        if (step === 2) text.innerText = "ဒီဂိမ်းလေးကို အဆုံးထိဆော့ပေးမယ်လို့ ကတိပေးလား? 🤙"; 
        else if (step === 3) text.innerText = "တကယ်တော့... မင်းက ကိုယ့်အတွက် အရမ်းထူးခြားတဲ့သူပါ ❤️"; 
        else if (step === 4) text.innerText = "ကိုယ်တို့ နှစ်ယောက် အတူတူရှိတဲ့အချိန်တိုင်း စိတ်ချမ်းသာရတယ်... ဒါကိုရော သိလား? 😊"; 
        else if (step === 5) text.innerText = "စကားမစပ်... ကိုယ့်အပြုံးတွေကို ဘယ်သူဖန်တီးပေးတာလဲ သိလား? (Hint: မင်းပဲ! 🫵)"; 
        else if (step === 6) text.innerText = "မေးခွန်းတွေက ပိုပြီး စိတ်လှုပ်ရှားဖို့ ကောင်းလာပြီနော်... အဆင်သင့်ပဲလား?"; 
        else if (step === 7) text.innerText = "ကိုယ် မင်းကို တစ်ခုခု တောင်းဆိုချင်လို့... ရမလား?"; 
        else if (step === 8) text.innerText = "ဒီနှစ် Valentine မှာ ကိုယ့်ရဲ့ တစ်ဦးတည်းသော Valentine ဖြစ်ပေးနိုင်မလား? 💖"; 
        else if (step === 9) showFinal();
    }

    function handleNo() {
        if (step < 8) {
            const alerts = [
                "အားအောင်လုပ်လိုက်ပါ... ခဏလေးပါပဲနော်! 😉",
                "ကတိမပေးရင် ရှေ့ဆက်လို့မရဘူးလေ... Yes ပဲနှိပ်ပါ! 🥺",
                "မထူးခြားဘူးလို့တော့ မပြောပါနဲ့... ❤️",
                "မသိရင် အခုသိအောင် ပြောပြနေတာလေ!",
                "မင်းမဟုတ်ရင် တခြားဘယ်သူရှိမှာလဲ? 😂",
                "အဆင်သင့်မဖြစ်လည်း ဖြစ်အောင်လုပ်ရမှာပဲ! 🚀",
                "တောင်းဆိုတာကို မငြင်းပါနဲ့... နားထောင်ကြည့်ပါဦး! ✨"
            ];
            alert(alerts[step-1]);
        } else {
            alert("မိသွားပြီ! No လို့ နှိပ်လို့မရတော့ဘူးလေ... Yes ပဲ ရှိတော့တယ်! 😜❤️");
        }
    }

    function moveNo() {
        if (step >= 8) {
            const noBtn = document.getElementById('noBtn');
            const padding = 80; // Large padding to keep it far away from edges
            
            // Calculate boundaries based on current visible window
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // Generate coordinates within the safe interior area
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }

    function showFinal() {
        document.body.style.background = "#ff4d6d";
        setInterval(createHeart, 200); 
        const card = document.getElementById('card');
        card.innerHTML = `
            <h2 style="color:#ff4d6d">Yayyy! I knew it! 🥰❤️</h2>
            <p style="font-weight:bold; color:#d63384">ဖေဖော်ဝါရီ ၁၄ မှာ ဆုံမယ်နော် နတ်သမီးလေး!</p>
            <img class="final-img" src="https://i.pinimg.com/736x/52/82/65/5282654c9291f66d10094fa0e30eba54.jpg">
            <div style="margin-top:15px; font-size:12px; color:#aaa;">( အားကျသွားပြီမလား😉 )</div>
        `;
    }
</script>

</body>
</html>
